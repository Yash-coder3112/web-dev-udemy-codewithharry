    <script>
      let a = 106;
      let b = 32;
      let sum = a + b;
      let avg = sum / 2;
      let averagePlusOne = avg + 1;
      console.log(averagePlusOne);

      // instead of the above process we can make a function in js
      function avgplusone(a, b) {
        let sum = a + b;
        let avg = sum / 2;
        let averagePlusOne = avg + 1;
        return averagePlusOne
      } 
      console.log(avgplusone(106,32))
